<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pralokmin Klaster</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <header class="bg-gradient-to-r from-blue-800 to-blue-600 text-white shadow-lg">
    <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
      <div class="flex items-center gap-3 mb-2 md:mb-0">
        <i class="fas fa-hospital fa-2x"></i>
        <h1 class="text-xl md:text-2xl font-bold">Digitalisasi Puskemsas Dayeuhluhur II</h1>
      </div>
    </div>
  </header>

  <!-- Navigasi hanya Home dan Pralokmin Klaster -->
  <nav class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
    <div class="container mx-auto px-4">
      <ul class="flex flex-wrap items-center gap-1 py-2 text-sm font-medium text-gray-700">
        <li><a href="index.html" class="nav-link px-3 py-2 flex items-center gap-1"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="pralokmin-klaster.html" class="nav-link active px-3 py-2 flex items-center gap-1 bg-blue-100 text-blue-700 rounded-md"><i class="fas fa-chart-pie"></i> Pralokmin Klaster</a></li>
      </ul>
    </div>
  </nav>

  <main class="flex-grow container mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow p-6 md:p-8">
      <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
          <i class="fas fa-chart-pie text-blue-600"></i> Dashboard Pralokmin Klaster
        </h2>
        <div class="flex items-center gap-3">
          <label for="monthPicker" class="text-sm font-medium text-gray-600">Bulan:</label>
          <input type="month" id="monthPicker" class="px-3 py-1 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" />
          <button id="refreshBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1 rounded-lg text-sm transition">
            <i class="fas fa-sync-alt"></i> Tampilkan
          </button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Klaster</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status Upload</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Aksi</th>
            </tr>
          </thead>
          <tbody id="statusTableBody" class="bg-white divide-y divide-gray-200">
          </tbody>
        </table>
      </div>

      <div class="mt-4 text-sm text-gray-500 flex items-center gap-4">
        <span><span class="inline-block w-3 h-3 bg-green-500 rounded-full"></span> Lengkap (hijau)</span>
        <span><span class="inline-block w-3 h-3 bg-red-500 rounded-full"></span> Belum lengkap (merah)</span>
      </div>
      <div class="mt-4">
        <a href="pralokmin.html" class="inline-block bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition text-sm">
          <i class="fas fa-upload mr-1"></i> Upload Dokumen Pralokmin
        </a>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-6">
    <div class="container mx-auto px-4 py-4 text-center text-sm text-gray-500">
      &copy; 2026 Puskemsas Dayeuhluhur II - Digitalisasi
    </div>
  </footer>

  <script>
    (function() {
      const monthPicker = document.getElementById('monthPicker');
      const refreshBtn = document.getElementById('refreshBtn');
      const tbody = document.getElementById('statusTableBody');

      const now = new Date();
      const defaultMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
      monthPicker.value = defaultMonth;

      function renderTable(month) {
        const storageKey = 'pralokmin_uploads';
        const data = JSON.parse(localStorage.getItem(storageKey) || '{}');
        const monthData = data[month] || {};

        const klasterList = ['1','2','3','4','5'];
        let html = '';
        klasterList.forEach(kl => {
          const klData = monthData[kl] || { undangan: false, notulen: false, lampiran: false };
          const allUploaded = klData.undangan && klData.notulen && klData.lampiran;
          const statusColor = allUploaded ? 'bg-green-500' : 'bg-red-500';
          const statusText = allUploaded ? 'Lengkap' : 'Belum lengkap';

          let missingDocs = [];
          if (!klData.undangan) missingDocs.push('Undangan');
          if (!klData.notulen) missingDocs.push('Notulen');
          if (!klData.lampiran) missingDocs.push('Lampiran');
          const missingDetail = missingDocs.length > 0 ? 'Belum: ' + missingDocs.join(', ') : '';

          html += `
            <tr>
              <td class="px-4 py-3 whitespace-nowrap font-medium text-gray-900">Klaster ${kl}</td>
              <td class="px-4 py-3">
                <div class="flex flex-col">
                  <span class="inline-flex items-center gap-1">
                    <span class="inline-block w-3 h-3 rounded-full ${statusColor}"></span>
                    ${statusText}
                  </span>
                  ${!allUploaded ? `<span class="text-xs text-gray-500 mt-1">${missingDetail}</span>` : ''}
                </div>
              </td>
              <td class="px-4 py-3 whitespace-nowrap">
                <a href="pralokmin.html?klaster=${kl}&month=${month}" class="text-blue-600 hover:underline text-sm">
                  <i class="fas fa-edit"></i> Upload
                </a>
              </td>
            </tr>
          `;
        });
        tbody.innerHTML = html;
      }

      function refresh() {
        const month = monthPicker.value;
        if (!month) {
          alert('Pilih bulan yang valid.');
          return;
        }
        renderTable(month);
      }

      refreshBtn.addEventListener('click', refresh);
      monthPicker.addEventListener('change', refresh);

      renderTable(defaultMonth);

      const urlParams = new URLSearchParams(window.location.search);
      const monthParam = urlParams.get('month');
      if (monthParam) {
        monthPicker.value = monthParam;
        renderTable(monthParam);
      }
    })();
  </script>

  <style>
    .nav-link.active {
      background-color: #dbeafe;
      color: #1e3a8a;
      border-radius: 0.375rem;
    }
    .nav-link:hover:not(.active) {
      background-color: #f3f4f6;
      border-radius: 0.375rem;
    }
  </style>
</body>
</html>
